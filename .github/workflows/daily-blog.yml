name: Daily AI Blog Generator

on:
  schedule:
    - cron: '30 0 * * *' # Runs at 00:30 UTC, right after the 10K refresh
  workflow_dispatch:      # Manual trigger button

jobs:
  write-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 # Add 'openai' or 'google-generativeai' here

      - name: Generate Blog Content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Store your key in GitHub Secrets
        run: python generate_blog.py

      - name: Commit New Blog Post
        run: |
          git config --global user.name "AI-Blog-Bot"
          git config --global user.email "bot@brightlane.io"
          git add blog/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily Post: $(date +'%Y-%m-%d')" && git push)
